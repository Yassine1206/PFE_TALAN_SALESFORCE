<template>
    <!-- Trigger button (floating in header area) -->
    <button class="cd-trigger" onclick={handleOpenBtn} title="Categories">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
        </svg>
    </button>

    <!-- Overlay -->
    <div class={overlayClass} onclick={handleOverlayClick}></div>

    <!-- Drawer -->
    <div class={drawerClass}>
        <div class="cd-header">
            <h2 class="cd-title">Categories</h2>
            <button class="cd-close" onclick={closeDrawer}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="cd-list">
            <template for:each={categories} for:item="cat">
                <div key={cat.name} class="cd-cat-group">
                    <div class="cd-cat-row" data-cat={cat.name} onclick={handleToggleCategory}>
                        <span class="cd-cat-name">{cat.name}</span>
                        <div class="cd-cat-right">
                            <!-- <span class="cd-cat-count">{cat.totalCount}</span> -->
                            <template if:true={cat.hasSubs}>
                                <svg class="cd-cat-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </template>
                        </div>
                    </div>
                    <template if:true={cat.isExpanded}>
                        <div class="cd-subs">
                            <div class="cd-sub-row" data-cat={cat.name} onclick={handleCategoryClick}>
                                <span class="cd-sub-name">All {cat.name}</span>
                                <!-- <span class="cd-sub-count">{cat.totalCount}</span> -->
                            </div>
                            <template for:each={cat.subcategories} for:item="sub">
                                <div key={sub.name} class="cd-sub-row" data-sub={sub.name} data-cat={cat.name} onclick={handleSubClick}>
                                    <span class="cd-sub-name">{sub.name}</span>
                                    <!-- <span class="cd-sub-count">{sub.count}</span> -->
                                </div>
                            </template>
                            
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>
</template>
