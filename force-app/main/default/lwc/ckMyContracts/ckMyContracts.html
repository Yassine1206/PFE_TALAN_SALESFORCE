<template>
  <div class="mc-wrapper">
    <!-- Header -->
    <div class="mc-header">
      <div class="mc-header-left">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#1D9E75"
          stroke-width="2"
        >
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <polyline points="12 18 8 14 12 10 16 14" />
        </svg>
        <h1 class="mc-title">My Contracts</h1>
      </div>
      <a href="/TalFlowExpress/s/my-quotes" class="mc-btn-quotes">
        View My Quotes
      </a>
    </div>

    <!-- Loading -->
    <template if:true={isLoading}>
      <div class="mc-loading">
        <div class="mc-spinner"></div>
        <p>Loading your contracts...</p>
      </div>
    </template>

    <!-- Error -->
    <template if:true={errorMessage}>
      <div class="mc-error">{errorMessage}</div>
    </template>

    <!-- Empty -->
    <template if:true={isEmpty}>
      <div class="mc-empty">
        <svg
          width="64"
          height="64"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#CED4DA"
          stroke-width="1"
        >
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        <h3>No contracts yet</h3>
        <p>Accept a quote to generate a contract</p>
        <a href="/TalFlowExpress/s/my-quotes" class="mc-btn-primary">
          View My Quotes
        </a>
      </div>
    </template>

    <!-- Contracts List -->
    <template if:true={hasContracts}>
      <div class="mc-list">
        <template for:each={contracts} for:item="contract">
          <div key={contract.contractId} class="mc-card">
            <div class="mc-card-header">
              <div class="mc-card-left">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#1D9E75"
                  stroke-width="2"
                >
                  <path
                    d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"
                  />
                  <polyline points="14 2 14 8 20 8" />
                </svg>
                <span class="mc-contract-number">
                  #{contract.contractNumber}
                </span>
              </div>
              <div class="mc-status-wrapper">
                <!-- Signed badge -->
                <template if:true={contract.showSignedBadge}>
                  <div class="mc-status mc-status-signed">
                    <svg
                      width="12"
                      height="12"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="3"
                    >
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    SIGNED
                  </div>
                </template>
                <div class={contract.statusClass}>{contract.status}</div>
              </div>
            </div>

            <div class="mc-card-body">
              <div class="mc-info-grid">
                <div class="mc-info-item">
                  <span class="mc-info-label">Quote</span>
                  <span class="mc-info-value">{contract.quoteName}</span>
                </div>
                <div class="mc-info-item">
                  <span class="mc-info-label">Start Date</span>
                  <span class="mc-info-value">{contract.startDate}</span>
                </div>
                <div class="mc-info-item">
                  <span class="mc-info-label">End Date</span>
                  <span class="mc-info-value">{contract.endDate}</span>
                </div>
                <div class="mc-info-item">
                  <span class="mc-info-label">Total Amount</span>
                  <span class="mc-info-value mc-amount">
                    {contract.totalAmount} TND
                  </span>
                </div>
              </div>

              <!-- Signature info if signed -->
              <template if:true={contract.isSigned}>
                <div class="mc-signature-info">
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M20 6L9 17l-5-5"></path>
                  </svg>
                  <span>
                    Signed by <strong>{contract.signedByName}</strong> on
                    {contract.signedDateFormatted}
                  </span>
                </div>
              </template>
            </div>

            <div class="mc-card-footer">
              <button
                class="mc-btn-download"
                onclick={handleDownloadContract}
                data-id={contract.contractId}
              >
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Download Contract
              </button>

              <!-- Sign button (only if not signed + activated) -->
              <template if:true={contract.canSign}>
                <button
                  class="mc-btn-sign"
                  onclick={handleOpenSign}
                  data-id={contract.contractId}
                  data-number={contract.contractNumber}
                >
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"
                    />
                    <path
                      d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"
                    />
                  </svg>
                  Sign Contract
                </button>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Signature Modal -->
    <c-ck-signature-pad
      contract-id={selectedContractId}
      contract-number={selectedContractNumber}
      customer-name={customerName}
      onsigned={handleSigned}
    ></c-ck-signature-pad>
  </div>
</template>
