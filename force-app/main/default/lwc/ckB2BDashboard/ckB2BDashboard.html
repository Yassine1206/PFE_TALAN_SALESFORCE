<template>
  <!-- ═══════════ LOADING STATE ═══════════ -->
  <template lwc:if={isLoading}>
    <div class="ck-loading">
      <div class="ck-spinner"></div>
      <p class="ck-loading-text">Loading your workspace...</p>
    </div>
  </template>

  <!-- ═══════════ ERROR STATE ═══════════ -->
  <template lwc:if={hasError}>
    <div class="ck-error">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      <p>Unable to load dashboard data. Please refresh the page.</p>
    </div>
  </template>

  <!-- ═══════════ DASHBOARD ═══════════ -->
  <template lwc:if={showDashboard}>
    <div class="ck-dashboard">
      <!-- ─── HERO ─── -->
      <header class="ck-hero">
        <div class="ck-hero-left">
          <div class="ck-hero-badge">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            <span>B2B Workspace</span>
          </div>
          <h1 class="ck-hero-title">
            Welcome back, <span class="ck-hero-name">{firstName}</span>
          </h1>
          <p class="ck-hero-company">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
              <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16" />
            </svg>
            {companyName}
          </p>
        </div>
        <div class="ck-hero-right-corner">
          <div class="ck-hero-date">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            {todayDate}
          </div>
        </div>
        <div class="ck-hero-decoration"></div>
      </header>

      <!-- ─── KPI GRID ─── -->
      <section class="ck-section">
        <h2 class="ck-section-title">Overview</h2>
        <div class="ck-kpi-grid">
          <!-- KPI 1 : Quotes Pending -->
          <div class="ck-kpi-card ck-kpi-orange">
            <div class="ck-kpi-top">
              <div class="ck-kpi-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"
                  />
                  <polyline points="14 2 14 8 20 8" />
                  <line x1="16" y1="13" x2="8" y2="13" />
                  <line x1="16" y1="17" x2="8" y2="17" />
                </svg>
              </div>
              <span class="ck-kpi-trend ck-trend-neutral">Pending</span>
            </div>
            <div class="ck-kpi-value">{totalQuotesPending}</div>
            <div class="ck-kpi-label">Quotes Pending</div>
          </div>

          <!-- KPI 2 : Active Contracts -->
          <div class="ck-kpi-card ck-kpi-green">
            <div class="ck-kpi-top">
              <div class="ck-kpi-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 11l3 3L22 4" />
                  <path
                    d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"
                  />
                </svg>
              </div>
              <span class="ck-kpi-trend ck-trend-up">Active</span>
            </div>
            <div class="ck-kpi-value">{activeContracts}</div>
            <div class="ck-kpi-label">Active Contracts</div>
          </div>

          <!-- KPI 3 : Total Spent YTD -->
          <div class="ck-kpi-card ck-kpi-blue">
            <div class="ck-kpi-top">
              <div class="ck-kpi-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="12" y1="1" x2="12" y2="23" />
                  <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
                </svg>
              </div>
              <span class="ck-kpi-trend ck-trend-up">YTD</span>
            </div>
            <div class="ck-kpi-value">{totalSpentYTDFormatted}</div>
            <div class="ck-kpi-label">Total Spent YTD</div>
          </div>

          <!-- KPI 4 : Pending Orders -->
          <div class="ck-kpi-card ck-kpi-navy">
            <div class="ck-kpi-top">
              <div class="ck-kpi-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="9" cy="21" r="1" />
                  <circle cx="20" cy="21" r="1" />
                  <path
                    d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.99-1.79l1.54-8.89H6"
                  />
                </svg>
              </div>
              <span class="ck-kpi-trend ck-trend-neutral">Orders</span>
            </div>
            <div class="ck-kpi-value">{pendingOrders}</div>
            <div class="ck-kpi-label">Pending Orders</div>
          </div>

          <!-- KPI 5 : Last Invoice Status -->
          <div class="ck-kpi-card ck-kpi-light">
            <div class="ck-kpi-top">
              <div class="ck-kpi-icon ck-icon-dark">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"
                  />
                  <polyline points="14 2 14 8 20 8" />
                </svg>
              </div>
              <span class="ck-kpi-label-top">Last Invoice</span>
            </div>
            <div class="ck-kpi-value ck-kpi-value-sm">{lastInvoiceStatus}</div>
            <div class="ck-kpi-label">{lastInvoiceDate}</div>
          </div>

          <!-- KPI 6 : Average Order Value -->
          <div class="ck-kpi-card ck-kpi-light">
            <div class="ck-kpi-top">
              <div class="ck-kpi-icon ck-icon-dark">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg>
              </div>
              <span class="ck-kpi-label-top">Avg. Order</span>
            </div>
            <div class="ck-kpi-value">{avgOrderValueFormatted}</div>
            <div class="ck-kpi-label">Average Order Value</div>
          </div>

          <!-- KPI 7 : Contracts Expiring Soon -->
          <div class={contractsExpiringSoonClass}>
            <div class="ck-kpi-top">
              <div class="ck-kpi-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg>
              </div>
              <span class={contractsExpiringSoonTrendClass}>
                {contractsExpiringSoonLabel}
              </span>
            </div>
            <div class="ck-kpi-value">{contractsExpiringSoon}</div>
            <div class="ck-kpi-label">Expiring Soon (&lt;30d)</div>
          </div>
        </div>
      </section>

      <!-- ─── CHART + QUICK LINKS ─── -->
      <div class="ck-bottom-grid">
        <!-- CHART — Quotes by Status -->
        <section class="ck-chart-section">
          <h2 class="ck-section-title">Quotes Overview</h2>
          <div class="ck-chart-wrap">
            <div class="ck-bar-chart">
              <div class="ck-bar-group">
                <div class="ck-bar-track">
                  <div class="ck-bar ck-bar-draft" data-bar="draft"></div>
                </div>
                <div class="ck-bar-value">{chartDraft}</div>
                <div class="ck-bar-label">Draft</div>
              </div>

              <div class="ck-bar-group">
                <div class="ck-bar-track">
                  <div class="ck-bar ck-bar-sent" data-bar="sent"></div>
                </div>
                <div class="ck-bar-value">{chartSent}</div>
                <div class="ck-bar-label">Sent</div>
              </div>

              <div class="ck-bar-group">
                <div class="ck-bar-track">
                  <div class="ck-bar ck-bar-accepted" data-bar="accepted"></div>
                </div>
                <div class="ck-bar-value">{chartAccepted}</div>
                <div class="ck-bar-label">Accepted</div>
              </div>

              <div class="ck-bar-group">
                <div class="ck-bar-track">
                  <div class="ck-bar ck-bar-rejected" data-bar="rejected"></div>
                </div>
                <div class="ck-bar-value">{chartRejected}</div>
                <div class="ck-bar-label">Rejected</div>
              </div>

              <div class="ck-bar-group">
                <div class="ck-bar-track">
                  <div class="ck-bar ck-bar-expired" data-bar="expired"></div>
                </div>
                <div class="ck-bar-value">{chartExpired}</div>
                <div class="ck-bar-label">Expired</div>
              </div>
            </div>

            <!-- Legend -->
            <div class="ck-chart-legend">
              <div class="ck-legend-item">
                <span class="ck-legend-dot ck-dot-draft"></span>Draft
              </div>
              <div class="ck-legend-item">
                <span class="ck-legend-dot ck-dot-sent"></span>Sent
              </div>
              <div class="ck-legend-item">
                <span class="ck-legend-dot ck-dot-accepted"></span>Accepted
              </div>
              <div class="ck-legend-item">
                <span class="ck-legend-dot ck-dot-rejected"></span>Rejected
              </div>
              <div class="ck-legend-item">
                <span class="ck-legend-dot ck-dot-expired"></span>Expired
              </div>
            </div>
          </div>
        </section>

        <!-- QUICK LINKS -->
        <section class="ck-links-section">
          <h2 class="ck-section-title">Quick Actions</h2>
          <div class="ck-links-grid">
            <a
              href="/TalFlowExpress/s/request-quote"
              class="ck-link-card ck-link-primary"
            >
              <div class="ck-link-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"
                  />
                  <polyline points="14 2 14 8 20 8" />
                  <line x1="12" y1="18" x2="12" y2="12" />
                  <line x1="9" y1="15" x2="15" y2="15" />
                </svg>
              </div>
              <div class="ck-link-content">
                <span class="ck-link-title">Request Quote</span>
                <span class="ck-link-desc">Submit a new quote request</span>
              </div>
              <svg
                class="ck-link-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </a>

            <a href="/TalFlowExpress/s/my-quotes" class="ck-link-card">
              <div class="ck-link-icon ck-link-icon-blue">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"
                  />
                  <polyline points="14 2 14 8 20 8" />
                </svg>
              </div>
              <div class="ck-link-content">
                <span class="ck-link-title">My Quotes</span>
                <span class="ck-link-desc">Accept or reject quotes</span>
              </div>
              <svg
                class="ck-link-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </a>

            <a href="/TalFlowExpress/s/my-contracts" class="ck-link-card">
              <div class="ck-link-icon ck-link-icon-green">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9 11l3 3L22 4" />
                  <path
                    d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"
                  />
                </svg>
              </div>
              <div class="ck-link-content">
                <span class="ck-link-title">My Contracts</span>
                <span class="ck-link-desc">Download contract PDFs</span>
              </div>
              <svg
                class="ck-link-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </a>

            <a href="/TalFlowExpress/s/b2b-catalog" class="ck-link-card">
              <div class="ck-link-icon ck-link-icon-orange">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                  <line x1="3" y1="6" x2="21" y2="6" />
                  <path d="M16 10a4 4 0 01-8 0" />
                </svg>
              </div>
              <div class="ck-link-content">
                <span class="ck-link-title">B2B Catalog</span>
                <span class="ck-link-desc"
                  >Browse products with B2B pricing</span
                >
              </div>
              <svg
                class="ck-link-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </a>
          </div>
        </section>
      </div>
    </div>
  </template>
</template>
