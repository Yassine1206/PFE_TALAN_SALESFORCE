<template>
    <div class="b2b-wrapper">

        <!-- Step Indicator -->
        <div class="b2b-steps">
            <div class={stepClass1}>
                <div class="b2b-step-circle">1</div>
                <span class="b2b-step-label">Company</span>
            </div>
            <div class="b2b-step-line"></div>
            <div class={stepClass2}>
                <div class="b2b-step-circle">2</div>
                <span class="b2b-step-label">Contact</span>
            </div>
            <div class="b2b-step-line"></div>
            <div class={stepClass3}>
                <div class="b2b-step-circle">3</div>
                <span class="b2b-step-label">Account</span>
            </div>
        </div>

        <!-- Error Message -->
        <template if:true={errorMessage}>
            <div class="b2b-error">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                {errorMessage}
            </div>
        </template>

        <!-- ═══ STEP 1 : Company Info ═══ -->
        <template if:true={isStep1}>
            <div class="b2b-card">
                <div class="b2b-card-header">
                    <div class="b2b-card-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg>
                    </div>
                    <div>
                        <h2 class="b2b-card-title">Company Information</h2>
                        <p class="b2b-card-subtitle">Tell us about your business</p>
                    </div>
                </div>

                <div class="b2b-form">
                    <div class="b2b-field">
                        <label class="b2b-label">Company Name <span class="b2b-required">*</span></label>
                        <input type="text" class="b2b-input" placeholder="Acme Corporation" data-field="companyName"
                            value={form.companyName} oninput={handleInput} />
                    </div>

                    <div class="b2b-row">
                        <div class="b2b-field">
                            <label class="b2b-label">Industry <span class="b2b-required">*</span></label>
                            <select class="b2b-select" data-field="industry" onchange={handleInput}>
                                <option value="">Select industry...</option>
                                <option value="Technology">Technology</option>
                                <option value="Finance">Finance</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Education">Education</option>
                                <option value="Retail">Retail</option>
                                <option value="Manufacturing">Manufacturing</option>
                                <option value="Construction">Construction</option>
                                <option value="Transportation">Transportation</option>
                                <option value="Media">Media</option>
                                <option value="Consulting">Consulting</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="b2b-field">
                            <label class="b2b-label">Number of Employees <span class="b2b-required">*</span></label>
                            <select class="b2b-select" data-field="numberOfEmployees" onchange={handleInput}>
                                <option value="">Select size...</option>
                                <option value="1">1 - 10</option>
                                <option value="11">11 - 50</option>
                                <option value="51">51 - 200</option>
                                <option value="201">201 - 500</option>
                                <option value="501">501 - 1000</option>
                                <option value="1001">1000+</option>
                            </select>
                        </div>
                    </div>

                    <div class="b2b-row">
                        <div class="b2b-field">
                            <label class="b2b-label">Website</label>
                            <input type="url" class="b2b-input" placeholder="https://company.com" data-field="website"
                                value={form.website} oninput={handleInput} />
                        </div>
                        <div class="b2b-field">
                            <label class="b2b-label">Annual Revenue</label>
                            <select class="b2b-select" data-field="annualRevenue" onchange={handleInput}>
                                <option value="">Select range...</option>
                                <option value="50000">Less than $100K</option>
                                <option value="250000">$100K - $500K</option>
                                <option value="750000">$500K - $1M</option>
                                <option value="2500000">$1M - $5M</option>
                                <option value="7500000">$5M - $10M</option>
                                <option value="25000000">$10M+</option>
                            </select>
                        </div>
                    </div>

                    <div class="b2b-row">
                        <div class="b2b-field">
                            <label class="b2b-label">City <span class="b2b-required">*</span></label>
                            <input type="text" class="b2b-input" placeholder="Tunis" data-field="city" value={form.city}
                                oninput={handleInput} />
                        </div>
                        <div class="b2b-field">
                            <label class="b2b-label">Country <span class="b2b-required">*</span></label>
                            <select class="b2b-select" data-field="country" onchange={handleInput}>
                                <option value="">Select country...</option>
                                <option value="TN">Tunisia</option>
                                <option value="FR">France</option>
                                <option value="DE">Germany</option>
                                <option value="GB">United Kingdom</option>
                                <option value="US">United States</option>
                                <option value="MA">Morocco</option>
                                <option value="DZ">Algeria</option>
                                <option value="AE">UAE</option>
                                <option value="SA">Saudi Arabia</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="b2b-field">
                        <label class="b2b-label">Business Description</label>
                        <textarea class="b2b-textarea"
                            placeholder="Briefly describe your business and what you're looking for..."
                            data-field="description" oninput={handleInput}>{form.description}</textarea>
                    </div>
                </div>

                <div class="b2b-actions">
                    <a href="/s/register" class="b2b-btn-ghost">← Back</a>
                    <button class="b2b-btn-primary" onclick={nextStep}>
                        Continue
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                    </button>
                </div>
            </div>
        </template>

        <!-- ═══ STEP 2 : Contact Info ═══ -->
        <template if:true={isStep2}>
            <div class="b2b-card">
                <div class="b2b-card-header">
                    <div class="b2b-card-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <div>
                        <h2 class="b2b-card-title">Contact Information</h2>
                        <p class="b2b-card-subtitle">Your personal details</p>
                    </div>
                </div>

                <div class="b2b-form">
                    <div class="b2b-row">
                        <div class="b2b-field">
                            <label class="b2b-label">First Name <span class="b2b-required">*</span></label>
                            <input type="text" class="b2b-input" placeholder="John" data-field="firstName"
                                value={form.firstName} oninput={handleInput} />
                        </div>
                        <div class="b2b-field">
                            <label class="b2b-label">Last Name <span class="b2b-required">*</span></label>
                            <input type="text" class="b2b-input" placeholder="Smith" data-field="lastName"
                                value={form.lastName} oninput={handleInput} />
                        </div>
                    </div>

                    <div class="b2b-field">
                        <label class="b2b-label">Job Title <span class="b2b-required">*</span></label>
                        <input type="text" class="b2b-input" placeholder="CEO, Purchasing Manager..." data-field="title"
                            value={form.title} oninput={handleInput} />
                    </div>

                    <div class="b2b-field">
                        <label class="b2b-label">Professional Email <span class="b2b-required">*</span></label>
                        <input type="email" class="b2b-input" placeholder="john@company.com" data-field="email"
                            value={form.email} oninput={handleInput} />
                    </div>

                    <div class="b2b-field">
                        <label class="b2b-label">Phone Number <span class="b2b-required">*</span></label>
                        <input type="tel" class="b2b-input" placeholder="+216 XX XXX XXX" data-field="phone"
                            value={form.phone} oninput={handleInput} />
                    </div>
                </div>

                <div class="b2b-actions">
                    <button class="b2b-btn-ghost" onclick={prevStep}>← Back</button>
                    <button class="b2b-btn-primary" onclick={nextStep}>
                        Continue
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                    </button>
                </div>
            </div>
        </template>

        <!-- ═══ STEP 3 : Account Setup ═══ -->
        <template if:true={isStep3}>
            <div class="b2b-card">
                <div class="b2b-card-header">
                    <div class="b2b-card-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0110 0v4" />
                        </svg>
                    </div>
                    <div>
                        <h2 class="b2b-card-title">Account Setup</h2>
                        <p class="b2b-card-subtitle">Create your login credentials</p>
                    </div>
                </div>

                <!-- Summary -->
                <div class="b2b-summary">
                    <div class="b2b-summary-row">
                        <span class="b2b-summary-label">Company</span>
                        <span class="b2b-summary-value">{form.companyName}</span>
                    </div>
                    <div class="b2b-summary-row">
                        <span class="b2b-summary-label">Industry</span>
                        <span class="b2b-summary-value">{form.industry}</span>
                    </div>
                    <div class="b2b-summary-row">
                        <span class="b2b-summary-label">Contact</span>
                        <span class="b2b-summary-value">{fullName}</span>
                    </div>
                    <div class="b2b-summary-row">
                        <span class="b2b-summary-label">Email</span>
                        <span class="b2b-summary-value">{form.email}</span>
                    </div>
                </div>

                <div class="b2b-form">
                    <div class="b2b-field">
                        <label class="b2b-label">Password <span class="b2b-required">*</span></label>
                        <div class="b2b-input-group">
                            <input type={passwordType} class="b2b-input" placeholder="Min. 8 characters"
                                data-field="password" value={form.password} oninput={handleInput} />
                            <button class="b2b-eye" onclick={togglePassword} type="button">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="b2b-field">
                        <label class="b2b-label">Confirm Password <span class="b2b-required">*</span></label>
                        <input type={passwordType} class="b2b-input" placeholder="Repeat password"
                            data-field="confirmPassword" value={form.confirmPassword} oninput={handleInput} />
                    </div>

                    <!-- Password strength -->
                    <div class="b2b-strength">
                        <div class="b2b-strength-bar">
                            <div class={strengthBarClass}></div>
                        </div>
                        <span class={strengthLabelClass}>{passwordStrengthLabel}</span>
                    </div>

                    <div class="b2b-terms">
                        <input type="checkbox" id="terms" class="b2b-checkbox" onchange={handleTerms} />
                        <label for="terms" class="b2b-terms-label">
                            I agree to the <a href="/s/terms" class="b2b-link">Terms of Service</a>
                            and <a href="/s/privacy" class="b2b-link">Privacy Policy</a>.
                            I understand my account will be reviewed before activation.
                        </label>
                    </div>
                </div>

                <div class="b2b-actions">
                    <button class="b2b-btn-ghost" onclick={prevStep}>← Back</button>
                    <button class="b2b-btn-primary" onclick={handleSubmit} disabled={isLoading}>
                        <template if:true={isLoading}>
                            <div class="b2b-spinner"></div>
                            Submitting...
                        </template>
                        <template if:false={isLoading}>
                            Submit Application
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                        </template>
                    </button>
                </div>
            </div>
        </template>

        <!-- ═══ SUCCESS ═══ -->
        <template if:true={isSuccess}>
            <div class="b2b-card b2b-success-card">
                <div class="b2b-success-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                </div>
                <h2 class="b2b-success-title">Application Submitted!</h2>
                <p class="b2b-success-text">
                    Thank you <strong>{form.firstName}</strong>! Your B2B application for
                    <strong>{form.companyName}</strong> has been received.
                </p>
                <div class="b2b-success-info">
                    <div class="b2b-info-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <span>Your application will be reviewed within 24-48 hours</span>
                    </div>
                    <div class="b2b-info-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        <span>Check your email at <strong>{form.email}</strong></span>
                    </div>
                </div>
                <a href="/s/login" class="b2b-btn-primary"
                    style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;">
                    Go to Login
                </a>
            </div>
        </template>

    </div>
</template>
