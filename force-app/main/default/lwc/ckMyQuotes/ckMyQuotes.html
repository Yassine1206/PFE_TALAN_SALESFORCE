<template>
  <div class="mq-wrapper">
    <!-- Header -->
    <div class="mq-header">
      <div class="mq-header-left">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#1971C2"
          stroke-width="2"
        >
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        <h1 class="mq-title">My Quotes</h1>
      </div>
      <a href="/TalFlowExpress/s/request-quote" class="mq-btn-new">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        New Quote Request
      </a>
    </div>

    <!-- Loading -->
    <template if:true={isLoading}>
      <div class="mq-loading">
        <div class="mq-spinner"></div>
        <p>Loading your quotes...</p>
      </div>
    </template>

    <!-- Error -->
    <template if:true={errorMessage}>
      <div class="mq-error">{errorMessage}</div>
    </template>

    <!-- Empty -->
    <template if:true={isEmpty}>
      <div class="mq-empty">
        <svg
          width="64"
          height="64"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#CED4DA"
          stroke-width="1"
        >
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        <h3>No quotes yet</h3>
        <p>Request your first B2B quote</p>
        <a href="/TalFlowExpress/s/request-quote" class="mq-btn-primary">
          Request a Quote
        </a>
      </div>
    </template>

    <!-- Quotes List -->
    <template if:true={hasQuotes}>
      <div class="mq-list">
        <template for:each={quotes} for:item="quote">
          <div key={quote.quoteId} class="mq-card">
            <div class="mq-card-header">
              <div class="mq-card-left">
                <span class="mq-quote-name"> {quote.quoteName} </span>
                <span class="mq-quote-number"> #{quote.quoteNumber} </span>
              </div>
              <div class={quote.statusClass}>{quote.statusLabel}</div>
            </div>

            <div class="mq-card-body">
              <div class="mq-info-row">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#868E96"
                  stroke-width="2"
                >
                  <rect x="3" y="4" width="18" height="18" rx="2" />
                  <line x1="16" y1="2" x2="16" y2="6" />
                  <line x1="8" y1="2" x2="8" y2="6" />
                  <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                <span>Created: {quote.createdDate}</span>
              </div>
              <div class="mq-info-row">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#868E96"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg>
                <span>Expires: {quote.expirationDate}</span>
              </div>
              <div class="mq-info-row">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#868E96"
                  stroke-width="2"
                >
                  <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                  <line x1="3" y1="6" x2="21" y2="6" />
                </svg>
                <span>{quote.itemCount} items</span>
              </div>
              <template if:true={quote.discountPercent}>
                <div class="mq-discount-badge">
                  {quote.discountPercent}% discount
                </div>
              </template>
            </div>

            <div class="mq-card-footer">
              <span class="mq-total"> {quote.grandTotal} TND </span>
              <div class="mq-card-actions">
                <button
                  class="mq-btn-detail"
                  onclick={handleViewDetail}
                  data-id={quote.quoteId}
                >
                  View Details
                </button>
                <template if:true={quote.canRespond}>
                  <button
                    class="mq-btn-accept"
                    onclick={handleAccept}
                    data-id={quote.quoteId}
                  >
                    ✓ Accept
                  </button>
                  <button
                    class="mq-btn-reject"
                    onclick={handleReject}
                    data-id={quote.quoteId}
                  >
                    ✗ Reject
                  </button>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>
  </div>

  <!-- Modal Detail -->
  <template if:true={showModal}>
    <div class="modal-overlay" onclick={closeModal}>
      <div class="modal-container" onclick={stopPropagation}>
        <div class="modal-header">
          <div class="modal-header-left">
            <h2 class="modal-title">{selectedQuote.quoteName}</h2>
            <span class="modal-subtitle"> #{selectedQuote.quoteNumber} </span>
          </div>
          <button class="modal-close" onclick={closeModal}>
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <template if:true={isLoadingDetail}>
          <div class="modal-loading">
            <div class="mq-spinner"></div>
          </div>
        </template>

        <template if:false={isLoadingDetail}>
          <div class="modal-body">
            <!-- Status + Actions -->
            <div class="modal-section modal-status-row">
              <div class={selectedQuote.statusClass}>
                {selectedQuote.statusLabel}
              </div>
              <template if:true={selectedQuote.canRespond}>
                <div class="modal-respond-actions">
                  <button
                    class="mq-btn-accept"
                    onclick={handleAcceptFromModal}
                    data-id={selectedQuote.quoteId}
                  >
                    ✓ Accept Quote
                  </button>
                  <button
                    class="mq-btn-reject"
                    onclick={handleRejectFromModal}
                    data-id={selectedQuote.quoteId}
                  >
                    ✗ Reject Quote
                  </button>
                </div>
              </template>
            </div>

            <!-- Items -->
            <div class="modal-section">
              <h3 class="modal-section-title">Products</h3>
              <div class="modal-items">
                <template for:each={selectedQuote.items} for:item="item">
                  <div key={item.itemId} class="modal-item">
                    <div class="modal-item-img">
                      <template if:true={item.imageUrl}>
                        <img
                          src={item.imageUrl}
                          alt={item.productName}
                          class="modal-item-photo"
                        />
                      </template>
                      <template if:false={item.imageUrl}>
                        <div class="modal-item-placeholder">
                          <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#CED4DA"
                            stroke-width="1.5"
                          >
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                          </svg>
                        </div>
                      </template>
                    </div>
                    <div class="modal-item-info">
                      <span class="modal-item-name"> {item.productName} </span>
                      <span class="modal-item-qty"> Qty: {item.quantity} </span>
                    </div>
                    <div class="modal-item-prices">
                      <span class="modal-item-unit">
                        {item.unitPrice} TND/unit
                      </span>
                      <span class="modal-item-total">
                        {item.totalPrice} TND
                      </span>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Pricing -->
            <div class="modal-section">
              <h3 class="modal-section-title">Pricing</h3>
              <div class="modal-totals">
                <div class="modal-total-row">
                  <span>Subtotal</span>
                  <span>{selectedQuote.subtotal} TND</span>
                </div>
                <template if:true={selectedQuote.discountPercent}>
                  <div class="modal-total-row modal-discount">
                    <span>
                      Volume Discount ({selectedQuote.discountPercent}%)
                    </span>
                    <span> -{selectedQuote.discountAmount} TND </span>
                  </div>
                </template>
                <div class="modal-total-row">
                  <span>Tax (19%)</span>
                  <span>{selectedQuote.tax} TND</span>
                </div>
                <div class="modal-total-row modal-total-final">
                  <span>Total TTC</span>
                  <span>{selectedQuote.grandTotal} TND</span>
                </div>
              </div>
            </div>

            <!-- Delivery -->
            <div class="modal-section">
              <h3 class="modal-section-title">Delivery</h3>
              <div class="modal-address">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#1971C2"
                  stroke-width="2"
                >
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                  <circle cx="12" cy="10" r="3" />
                </svg>
                <div>
                  <p class="modal-address-line">
                    {selectedQuote.shippingAddress}
                  </p>
                  <p class="modal-address-line">
                    {selectedQuote.shippingCity}, {selectedQuote.shippingZip}
                  </p>
                  <p class="modal-address-line">
                    {selectedQuote.shippingCountry}
                  </p>
                  <p class="modal-address-line">
                    Requested: {selectedQuote.deliveryDate}
                  </p>
                </div>
              </div>
            </div>

            <!-- Special Terms -->
            <template if:true={selectedQuote.specialTerms}>
              <div class="modal-section">
                <h3 class="modal-section-title">Special Terms</h3>
                <div class="modal-terms">{selectedQuote.specialTerms}</div>
              </div>
            </template>

            <!-- Comments -->
            <template if:true={selectedQuote.description}>
              <div class="modal-section">
                <h3 class="modal-section-title">Comments</h3>
                <p class="modal-comments">{selectedQuote.description}</p>
              </div>
            </template>

            <!-- Download Quote PDF -->
            <div class="modal-section">
              <button
                class="mq-btn-download"
                onclick={handleDownloadQuotePdf}
                data-id={selectedQuote.quoteId}
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Download Quote PDF
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- Confirm Dialog -->
  <template if:true={showConfirm}>
    <div class="modal-overlay" onclick={cancelConfirm}>
      <div class="confirm-container" onclick={stopPropagation}>
        <h3 class="confirm-title">{confirmTitle}</h3>
        <p class="confirm-message">{confirmMessage}</p>
        <div class="confirm-actions">
          <button class="rq-btn-ghost" onclick={cancelConfirm}>Cancel</button>
          <button
            class={confirmBtnClass}
            onclick={executeConfirm}
            disabled={isResponding}
          >
            <template if:true={isResponding}>
              <div class="mq-spinner-sm"></div>
            </template>
            <template if:false={isResponding}> {confirmBtnLabel} </template>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- Toast -->
  <template if:true={toast}>
    <div class={toastClass}>{toast}</div>
  </template>
</template>
