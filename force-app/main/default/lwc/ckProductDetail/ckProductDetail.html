<template>
  <!-- Loading -->
  <template if:true={isLoading}>
    <div class="detail-loading">
      <div class="detail-spinner"></div>
    </div>
  </template>

  <!-- Product Detail -->
  <template if:false={isLoading}>
    <template if:true={product}>
      <div class="detail-wrapper">
        <!-- Breadcrumb -->
        <div class="detail-breadcrumb">
          <a href="/s/" class="breadcrumb-link">Home</a>
          <span class="breadcrumb-sep">/</span>
          <a href="/s/" class="breadcrumb-link">Shop</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-link">{product.category}</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">{product.name}</span>
        </div>

        <!-- Main Content -->
        <div class="detail-grid">
          <!-- Image -->
          <div class="detail-image-section">
            <div class="detail-image-main">
              <img src={product.image} alt={product.name} />
              <span class="detail-badge">{product.category}</span>
            </div>
          </div>

          <!-- Info -->
          <div class="detail-info-section">
            <div class="detail-name-row">
              <h1 class="detail-name">{product.name}</h1>
              <button class={favoriteClass} onclick={handleToggleFavorite}>
                <template if:true={isFavorited}>
                  <svg
                    width="22"
                    height="22"
                    viewBox="0 0 24 24"
                    fill="#E24B4A"
                    stroke="#E24B4A"
                    stroke-width="2"
                  >
                    <path
                      d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"
                    ></path>
                  </svg>
                </template>
                <template if:false={isFavorited}>
                  <svg
                    width="22"
                    height="22"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#868E96"
                    stroke-width="2"
                  >
                    <path
                      d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"
                    ></path>
                  </svg>
                </template>
              </button>
            </div>

            <div class="detail-rating-row">
              <div class="detail-stars">
                <span class="detail-stars-filled">★★★★★</span>
              </div>
              <span class="detail-rating-value">{product.rating}</span>
              <span class="detail-rating-text">Rating</span>
            </div>

            <div class="detail-price-box">
              <span class="detail-price">{product.price}</span>
              <span class="detail-price-note"
                >Tax excluded, add at checkout if applicable</span
              >
              <template if:true={stockInfo}>
                <div class="detail-stock-row">
                  <span class={stockClass}>{stockLabel}</span>
                  <template if:true={stockQuantityText}>
                    <span class="stock-qty-text">{stockQuantityText}</span>
                  </template>
                </div>
              </template>
            </div>

            <div class="detail-divider"></div>

            <div class="detail-description">
              <h3 class="detail-desc-title">Description</h3>
              <p class="detail-desc-text">{product.description}</p>
            </div>

            <div class="detail-divider"></div>

            <!-- Quantity -->
            <div class="detail-qty-section">
              <h3 class="detail-qty-label">Quantity</h3>
              <div class="detail-qty-controls">
                <button class="detail-qty-btn" onclick={decrementQty}>−</button>
                <span class="detail-qty-value">{quantity}</span>
                <button class="detail-qty-btn" onclick={incrementQty}>+</button>
              </div>
            </div>

            <!-- Actions -->
            <div class="detail-actions">
              <button
                class="detail-btn-cart"
                onclick={handleAddToCart}
                disabled={addToCartDisabled}
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="9" cy="21" r="1"></circle>
                  <circle cx="20" cy="21" r="1"></circle>
                  <path
                    d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"
                  ></path>
                </svg>
                <template if:true={canAddToCart}>Add to Cart</template>
                <template if:false={canAddToCart}>Out of Stock</template>
              </button>
              <button
                class="detail-btn-buy"
                onclick={handleBuyNow}
                disabled={buyNowDisabled}
              >
                <template if:true={canAddToCart}>Buy Now</template>
                <template if:false={canAddToCart}>Unavailable</template>
              </button>
            </div>

            <!-- Trust badges -->
            <div class="detail-trust">
              <div class="detail-trust-item">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#45C65A"
                  stroke-width="2"
                >
                  <path d="M22 11.08V12a10 10 0 11-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>Free Shipping</span>
              </div>
              <div class="detail-trust-item">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#45C65A"
                  stroke-width="2"
                >
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span>Secure Payment</span>
              </div>
              <div class="detail-trust-item">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#45C65A"
                  stroke-width="2"
                >
                  <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                </svg>
                <span>30-Day Returns</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Related Products -->
        <template if:true={hasRelated}>
          <div class="related-section">
            <h2 class="related-title">You May Also Like</h2>
            <p class="related-subtitle">
              Products picked for you based on your interest
            </p>

            <div class="related-grid">
              <template for:each={relatedProducts} for:item="item">
                <a key={item.id} href={item.detailUrl} class="related-card">
                  <div class="related-card-img">
                    <img src={item.image} alt={item.name} />
                    <span class="related-card-tag">{item.category}</span>
                    <button
                      class="related-card-fav"
                      data-id={item.id}
                      onclick={handleRelatedFav}
                    >
                      <svg
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#fff"
                        stroke-width="2"
                      >
                        <path
                          d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"
                        ></path>
                      </svg>
                    </button>
                  </div>
                  <div class="related-card-body">
                    <h3 class="related-card-name">{item.name}</h3>
                    <div class="related-card-meta">
                      <span class="related-card-price">{item.price}</span>
                      <span class="related-card-rating">★ {item.rating}</span>
                    </div>
                  </div>
                  <button
                    class="related-card-add"
                    data-id={item.id}
                    onclick={handleRelatedAdd}
                  >
                    Quick Add
                  </button>
                </a>
              </template>
            </div>
          </div>
        </template>
        <!-- ⭐ NEW : Customer Reviews -->
        <div class="detail-reviews-section">
          <c-ck-product-reviews
            product-id={productId}
            product-name={productName}
          >
          </c-ck-product-reviews>
        </div>
      </div>
    </template>

    <!-- Not found -->
    <template if:false={product}>
      <div class="detail-not-found">
        <h2>Product Not Found</h2>
        <p>This product doesn't exist or has been removed.</p>
        <a href="/s/" class="detail-btn-back">Back to Home</a>
      </div>
    </template>
  </template>
</template>
