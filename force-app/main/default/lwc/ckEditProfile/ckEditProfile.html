<template>
    <div class="profile-wrapper">

        <!-- Header -->
        <div class="profile-header">
            <a href="/TalFlowExpress/s/" class="profile-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                Back
            </a>
            <div class="profile-header-center">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <h1 class="profile-title">Edit Profile</h1>
            </div>
            <div style="width:60px;"></div>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="ep-loading">
                <div class="ep-spinner"></div>
                <p>Loading your profile...</p>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="profile-grid">

                <!-- ═══ SECTION 1 : Personal Info ═══ -->
                <div class="ep-card">
                    <div class="ep-card-header">
                        <div class="ep-card-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A"
                                stroke-width="2">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="ep-card-title">Personal Information</h2>
                            <p class="ep-card-subtitle">Update your basic details</p>
                        </div>
                    </div>

                    <template if:true={profileSuccess}>
                        <div class="ep-success">{profileSuccess}</div>
                    </template>
                    <template if:true={profileError}>
                        <div class="ep-error">{profileError}</div>
                    </template>

                    <div class="ep-form">
                        <div class="ep-row">
                            <div class="ep-field">
                                <label class="ep-label">First Name</label>
                                <input type="text" class="ep-input" data-field="firstName" value={form.firstName}
                                    oninput={handleProfileInput} />
                            </div>
                            <div class="ep-field">
                                <label class="ep-label">Last Name</label>
                                <input type="text" class="ep-input" data-field="lastName" value={form.lastName}
                                    oninput={handleProfileInput} />
                            </div>
                        </div>
                        <div class="ep-field">
                            <label class="ep-label">Phone</label>
                            <input type="tel" class="ep-input" data-field="phone" value={form.phone}
                                oninput={handleProfileInput} />
                        </div>
                        <div class="ep-row">
                            <div class="ep-field">
                                <label class="ep-label">City</label>
                                <input type="text" class="ep-input" data-field="city" value={form.city}
                                    oninput={handleProfileInput} />
                            </div>
                            <div class="ep-field">
                                <label class="ep-label">Country</label>
                                <input type="text" class="ep-input" data-field="country" value={form.country}
                                    oninput={handleProfileInput} />
                            </div>
                        </div>
                    </div>

                    <button class="ep-btn-primary" onclick={handleUpdateProfile} disabled={isSavingProfile}>
                        <template if:true={isSavingProfile}>
                            <div class="ep-spinner-sm"></div>
                            Saving...
                        </template>
                        <template if:false={isSavingProfile}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                            Save Changes
                        </template>
                    </button>
                </div>

                <!-- ═══ SECTION 2 : Change Email ═══ -->
                <div class="ep-card">
                    <div class="ep-card-header">
                        <div class="ep-card-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A"
                                stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="ep-card-title">Change Email</h2>
                            <p class="ep-card-subtitle">Current: {form.email}</p>
                        </div>
                    </div>

                    <template if:true={emailSuccess}>
                        <div class="ep-success">{emailSuccess}</div>
                    </template>
                    <template if:true={emailError}>
                        <div class="ep-error">{emailError}</div>
                    </template>

                    <!-- Step 1 : New Email -->
                    <template if:false={showEmailCode}>
                        <div class="ep-form">
                            <div class="ep-field">
                                <label class="ep-label">New Email Address</label>
                                <input type="email" class="ep-input" placeholder="newemail@example.com" value={newEmail}
                                    oninput={handleNewEmailInput} />
                            </div>
                        </div>
                        <button class="ep-btn-primary" onclick={handleRequestEmailChange} disabled={isSavingEmail}>
                            <template if:true={isSavingEmail}>
                                <div class="ep-spinner-sm"></div>
                                Sending code...
                            </template>
                            <template if:false={isSavingEmail}>
                                Send Verification Code
                            </template>
                        </button>
                    </template>

                    <!-- Step 2 : Verify Code -->
                    <template if:true={showEmailCode}>
                        <div class="ep-verify-info">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="12" y1="8" x2="12" y2="12" />
                                <line x1="12" y1="16" x2="12.01" y2="16" />
                            </svg>
                            We sent a 6-digit code to <strong>{newEmail}</strong>
                        </div>
                        <div class="ep-form">
                            <div class="ep-field">
                                <label class="ep-label">Verification Code</label>
                                <input type="text" class="ep-input ep-code-input" maxlength="6" placeholder="000000"
                                    value={emailCode} oninput={handleEmailCodeInput} />
                            </div>
                        </div>
                        <div class="ep-actions-row">
                            <button class="ep-btn-ghost" onclick={cancelEmailChange}>
                                Cancel
                            </button>
                            <button class="ep-btn-primary" onclick={handleConfirmEmailChange} disabled={isSavingEmail}>
                                <template if:true={isSavingEmail}>
                                    <div class="ep-spinner-sm"></div>
                                    Verifying...
                                </template>
                                <template if:false={isSavingEmail}>
                                    Confirm Change
                                </template>
                            </button>
                        </div>
                    </template>
                </div>

                <!-- ═══ SECTION 3 : Change Password ═══ -->
                <template if:false={isSocialUser}>
                    <div class="ep-card">
                        <div class="ep-card-header">
                            <div class="ep-card-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A"
                                    stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0110 0v4" />
                                </svg>
                            </div>
                            <div>
                                <h2 class="ep-card-title">Change Password</h2>
                                <p class="ep-card-subtitle">Keep your account secure</p>
                            </div>
                        </div>

                        <template if:true={passwordSuccess}>
                            <div class="ep-success">{passwordSuccess}</div>
                        </template>
                        <template if:true={passwordError}>
                            <div class="ep-error">{passwordError}</div>
                        </template>

                        <div class="ep-form">
                            <div class="ep-field">
                                <label class="ep-label">Current Password</label>
                                <div class="ep-input-group">
                                    <input type={oldPasswordType} class="ep-input" placeholder="Enter current password"
                                        value={oldPassword} oninput={handleOldPasswordInput} />
                                    <button class="ep-eye" onclick={toggleOldPassword} type="button">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                            <circle cx="12" cy="12" r="3" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="ep-field">
                                <label class="ep-label">New Password</label>
                                <div class="ep-input-group">
                                    <input type={newPasswordType} class="ep-input" placeholder="Min. 8 characters"
                                        value={newPassword} oninput={handleNewPasswordInput} />
                                    <button class="ep-eye" onclick={toggleNewPassword} type="button">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                            <circle cx="12" cy="12" r="3" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="ep-field">
                                <label class="ep-label">Confirm New Password</label>
                                <input type={newPasswordType} class="ep-input" placeholder="Repeat new password"
                                    value={confirmPassword} oninput={handleConfirmPasswordInput} />
                            </div>
                            <div class="ep-strength">
                                <div class="ep-strength-bar">
                                    <div class={strengthBarClass}></div>
                                </div>
                                <span class={strengthLabelClass}>{passwordStrengthLabel}</span>
                            </div>
                        </div>

                        <button class="ep-btn-primary" onclick={handleUpdatePassword} disabled={isSavingPassword}>
                            <template if:true={isSavingPassword}>
                                <div class="ep-spinner-sm"></div>
                                Updating...
                            </template>
                            <template if:false={isSavingPassword}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0110 0v4" />
                                </svg>
                                Update Password
                            </template>
                        </button>
                    </div>
                </template>

                <!-- Message si Social User -->
                <template if:true={isSocialUser}>
                    <div class="ep-card">
                        <div class="ep-card-header">
                            <div class="ep-card-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A"
                                    stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0110 0v4" />
                                </svg>
                            </div>
                            <div>
                                <h2 class="ep-card-title">Change Password</h2>
                                <p class="ep-card-subtitle">Social account detected</p>
                            </div>
                        </div>
                        <div class="ep-social-info">
                            <svg width="20" height="20" viewBox="0 0 24 24">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335" />
                            </svg>
                            <div>
                                <p class="ep-social-title">You're signed in with Google</p>
                                <p class="ep-social-desc">
                                    Password management is handled by Google.
                                    To change your password, visit your
                                    <a href="https://myaccount.google.com/security" target="_blank"
                                        class="ep-social-link">
                                        Google Account settings
                                    </a>.
                                </p>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ═══ SECTION 4 : Profile Photo ═══ -->
                <div class="ep-card">
                    <div class="ep-card-header">
                        <div class="ep-card-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A"
                                stroke-width="2">
                                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                                <circle cx="12" cy="13" r="4" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="ep-card-title">Profile Photo</h2>
                            <p class="ep-card-subtitle">Update your profile picture</p>
                        </div>
                    </div>

                    <template if:true={photoSuccess}>
                        <div class="ep-success">{photoSuccess}</div>
                    </template>
                    <template if:true={photoError}>
                        <div class="ep-error">{photoError}</div>
                    </template>

                    <!-- Current Photo -->
                    <div class="ep-photo-center">
                        <div class="ep-photo-avatar" onclick={triggerPhotoUpload}>
                            <template if:true={currentPhoto}>
                                <img src={currentPhoto} alt="Profile" class="ep-photo-img" />
                            </template>
                            <template if:false={currentPhoto}>
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#CED4DA"
                                    stroke-width="1.5">
                                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg>
                            </template>
                            <div class="ep-photo-overlay">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff"
                                    stroke-width="2">
                                    <path
                                        d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                                    <circle cx="12" cy="13" r="4" />
                                </svg>
                            </div>
                            <input type="file" class="ep-photo-input" accept="image/*" data-id="photoInput"
                                onchange={handlePhotoSelect} />
                        </div>
                        <p class="ep-photo-hint">Click to change photo</p>
                    </div>

                    <!-- Preview + Editor -->
                    <template if:true={showPhotoPreview}>
                        <div class="ep-photo-preview-wrap">
                            <p class="ep-photo-preview-title">Preview</p>
                            <div class="ep-photo-preview-box">
                                <img src={tempPhotoUrl} alt="Preview" class="ep-photo-preview-img"
                                    data-id="previewImg" />
                            </div>

                            <!-- Zoom -->
                            <div class="ep-photo-zoom">
                                <span class="ep-zoom-label">Zoom</span>
                                <input type="range" class="ep-zoom-slider" min="100" max="250" value={photoZoom}
                                    onchange={handleZoom} />
                                <span class="ep-zoom-value">{photoZoom}%</span>
                            </div>

                            <!-- Position -->
                            <div class="ep-photo-controls">
                                <div class="ep-ctrl-row">
                                    <button class="ep-ctrl-btn" data-dir="up" onclick={movePhoto}>↑</button>
                                </div>
                                <div class="ep-ctrl-row">
                                    <button class="ep-ctrl-btn" data-dir="left" onclick={movePhoto}>←</button>
                                    <button class="ep-ctrl-btn ep-ctrl-reset" onclick={resetPhotoPosition}>●</button>
                                    <button class="ep-ctrl-btn" data-dir="right" onclick={movePhoto}>→</button>
                                </div>
                                <div class="ep-ctrl-row">
                                    <button class="ep-ctrl-btn" data-dir="down" onclick={movePhoto}>↓</button>
                                </div>
                            </div>

                            <div class="ep-actions-row">
                                <button class="ep-btn-ghost" onclick={cancelPhotoEdit}>Cancel</button>
                                <button class="ep-btn-primary" onclick={handleSavePhoto} disabled={isUploadingPhoto}>
                                    <template if:true={isUploadingPhoto}>
                                        <div class="ep-spinner-sm"></div>
                                        Uploading...
                                    </template>
                                    <template if:false={isUploadingPhoto}>
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <polyline points="20 6 9 17 4 12" />
                                        </svg>
                                        Save Photo
                                    </template>
                                </button>
                            </div>
                        </div>
                    </template>

                </div>

            </div>
        </template>

    </div>
</template>
