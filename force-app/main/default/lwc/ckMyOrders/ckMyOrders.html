<template>
    <div class="orders-wrapper">

        <!-- Header -->
        <div class="orders-header">
            <div class="orders-header-left">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                    <line x1="1" y1="10" x2="23" y2="10" />
                </svg>
                <h1 class="orders-title">My Orders</h1>
            </div>
            <span class="orders-count">{filteredCount} orders</span>
        </div>

        <!-- Status Badges -->
        <div class="orders-stats">
            <div class={allBadgeClass} onclick={filterByStatus} data-status="">
                All <span>{totalCount}</span>
            </div>
            <div class={paidBadgeClass} onclick={filterByStatus} data-status="Paid">
                Paid <span>{paidCount}</span>
            </div>
            <div class={codBadgeClass} onclick={filterByStatus} data-status="Awaiting Delivery Payment">
                COD <span>{codCount}</span>
            </div>
            <div class={processingBadgeClass} onclick={filterByStatus} data-status="Activated">
                Processing <span>{processingCount}</span>
            </div>
        </div>

        <!-- Filters -->
        <div class="orders-filters">
            <div class="filter-search">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#868E96" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" placeholder="Search by order number..." class="filter-input" oninput={handleSearch}
                    value={searchTerm} />
            </div>

            <!-- Status Filter -->
            <select class="filter-select" onchange={handleStatusFilter}>
                <option value="" selected={isStatusAll}>All Statuses</option>
                <option value="Paid" selected={isStatusPaid}>Paid</option>
                <option value="Activated" selected={isStatusActivated}>Processing</option>
                <option value="Awaiting Delivery Payment" selected={isStatusCOD}>COD</option>
                <option value="Draft" selected={isStatusDraft}>Draft</option>
            </select>

            <!-- Payment Filter -->
            <select class="filter-select" onchange={handlePaymentFilter}>
                <option value="" selected={isPaymentAll}>All Payments</option>
                <option value="Card" selected={isPaymentCard}>Card</option>
                <option value="COD" selected={isPaymentCOD}>COD</option>
            </select>

            <!-- Sort -->
            <select class="filter-select" onchange={handleSortFilter}>
                <option value="date-desc" selected={isSortDateDesc}>Newest First</option>
                <option value="date-asc" selected={isSortDateAsc}>Oldest First</option>
                <option value="amount-desc" selected={isSortAmountDesc}>Amount ↓</option>
                <option value="amount-asc" selected={isSortAmountAsc}>Amount ↑</option>
            </select>

            <template if:true={hasActiveFilters}>
                <button class="filter-reset" onclick={resetFilters}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                    Reset
                </button>
            </template>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="orders-loading">
                <div class="orders-spinner"></div>
                <p>Loading your orders...</p>
            </div>
        </template>

        <!-- Error -->
        <template if:true={errorMessage}>
            <div class="orders-error">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                {errorMessage}
            </div>
        </template>

        <!-- Empty -->
        <template if:true={isEmpty}>
            <div class="orders-empty">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#CED4DA" stroke-width="1">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                    <line x1="1" y1="10" x2="23" y2="10" />
                </svg>
                <h3>No orders found</h3>
                <p>Try adjusting your filters or start shopping</p>
                <a href="/TalFlowExpress/s/" class="orders-btn-shop">
                    Start Shopping
                </a>
            </div>
        </template>

        <!-- Orders Grid -->
        <template if:true={hasOrders}>
            <div class="orders-grid">
                <template for:each={paginatedOrders} for:item="order">
                    <div key={order.orderId} class="order-card">

                        <div class="order-card-header">
                            <span class="order-number">#{order.orderNumber}</span>
                            <div class={order.statusClass}>{order.statusLabel}</div>
                        </div>

                        <div class="order-card-body" onclick={handleOrderClick} data-id={order.orderId}>
                            <div class="order-info-row">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#868E96"
                                    stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" />
                                    <line x1="16" y1="2" x2="16" y2="6" />
                                    <line x1="8" y1="2" x2="8" y2="6" />
                                    <line x1="3" y1="10" x2="21" y2="10" />
                                </svg>
                                <span>{order.orderDate}</span>
                            </div>
                            <div class="order-info-row">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#868E96"
                                    stroke-width="2">
                                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                                    <line x1="3" y1="6" x2="21" y2="6" />
                                </svg>
                                <span>{order.itemCount} items</span>
                            </div>
                            <div class="order-info-row">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#868E96"
                                    stroke-width="2">
                                    <rect x="1" y="4" width="22" height="16" rx="2" />
                                    <line x1="1" y1="10" x2="23" y2="10" />
                                </svg>
                                <span>{order.paymentMethod}</span>
                            </div>
                            <div class="order-total-amount">${order.totalTTC}</div>
                        </div>

                        <div class="order-card-actions">
                            <button class="btn-details" onclick={handleOrderClick} data-id={order.orderId}>
                                Details
                            </button>
                            <button class="btn-reorder" onclick={handleReorder} data-id={order.orderId}>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="1 4 1 10 7 10" />
                                    <path d="M3.51 15a9 9 0 102.13-9.36L1 10" />
                                </svg>
                                Buy Again
                            </button>
                            <button class="btn-invoice" onclick={handleDownloadInvoice} data-id={order.orderId}>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                                    <polyline points="7 10 12 15 17 10" />
                                    <line x1="12" y1="15" x2="12" y2="3" />
                                </svg>
                                Invoice
                            </button>
                            <button class="btn-return" onclick={handleReturn} data-id={order.orderId}>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="1 4 1 10 7 10" />
                                    <path d="M3.51 15a9 9 0 102.13-9.36L1 10" />
                                </svg>
                                Return
                            </button>
                        </div>

                    </div>
                </template>
            </div>

            <!-- Pagination -->
            <div class="orders-pagination">
                <button class="page-btn" onclick={prevPage} disabled={isFirstPage}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <div class="page-numbers">
                    <template for:each={pageNumbers} for:item="page">
                        <button key={page.num} class={page.cssClass} onclick={goToPage} data-page={page.num}>
                            {page.num}
                        </button>
                    </template>
                </div>
                <button class="page-btn" onclick={nextPage} disabled={isLastPage}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>
            </div>
        </template>

    </div>

    <!-- Toast -->
    <template if:true={showReorderToast}>
        <div class="toast-success">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2">
                <polyline points="20 6 9 17 4 12" />
            </svg>
            Items added to cart!
        </div>
    </template>

    <!-- Modal -->
    <template if:true={showModal}>
        <div class="modal-overlay" onclick={closeModal}>
            <div class="modal-container" onclick={stopPropagation}>

                <div class="modal-header">
                    <div class="modal-header-left">
                        <h2 class="modal-title">Order #{selectedOrder.orderNumber}</h2>
                        <span class="modal-date">{selectedOrder.orderDate}</span>
                    </div>
                    <button class="modal-close" onclick={closeModal}>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>

                <template if:true={isLoadingDetail}>
                    <div class="modal-loading">
                        <div class="orders-spinner"></div>
                    </div>
                </template>

                <template if:false={isLoadingDetail}>
                    <div class="modal-body">

                        <div class="modal-section modal-status-row">
                            <div class={selectedOrder.statusClass}>
                                {selectedOrder.statusLabel}
                            </div>
                            <div class="modal-payment-badge">
                                {selectedOrder.paymentMethod}
                            </div>
                        </div>

                        <div class="modal-section">
                            <h3 class="modal-section-title">Items</h3>
                            <div class="modal-items">
                                <template for:each={selectedOrder.items} for:item="item">
                                    <div key={item.itemId} class="modal-item">
                                        <div class="modal-item-img">
                                            <template if:true={item.image}>
                                                <img src={item.image} alt={item.name} class="modal-item-photo" />
                                            </template>
                                            <template if:false={item.image}>
                                                <div class="modal-item-placeholder">
                                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                                        stroke="#CED4DA" stroke-width="1.5">
                                                        <rect x="3" y="3" width="18" height="18" rx="2" />
                                                        <circle cx="8.5" cy="8.5" r="1.5" />
                                                        <polyline points="21 15 16 10 5 21" />
                                                    </svg>
                                                </div>
                                            </template>
                                        </div>
                                        <div class="modal-item-info">
                                            <span class="modal-item-name">{item.name}</span>
                                            <span class="modal-item-qty">Qty: {item.quantity}</span>
                                        </div>
                                        <div class="modal-item-price">${item.totalPrice}</div>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div class="modal-section">
                            <h3 class="modal-section-title">Shipping Address</h3>
                            <div class="modal-address">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A"
                                    stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                                    <circle cx="12" cy="10" r="3" />
                                </svg>
                                <div>
                                    <p class="modal-address-line">{selectedOrder.shippingAddress}</p>
                                    <p class="modal-address-line">
                                        {selectedOrder.shippingCity}, {selectedOrder.shippingZip}
                                    </p>
                                    <p class="modal-address-line">{selectedOrder.shippingCountry}</p>
                                </div>
                            </div>
                        </div>

                        <div class="modal-section">
                            <h3 class="modal-section-title">Order Summary</h3>
                            <div class="modal-totals">
                                <div class="modal-total-row">
                                    <span>Subtotal</span>
                                    <span>${selectedOrder.subtotal}</span>
                                </div>
                                <template if:true={selectedOrder.hasDiscount}>
                                    <div class="modal-total-row modal-discount">
                                        <span>Discount
                                            <template if:true={selectedOrder.promoCode}>
                                                ({selectedOrder.promoCode})
                                            </template>
                                        </span>
                                        <span>-${selectedOrder.discount}</span>
                                    </div>
                                </template>
                                <div class="modal-total-row">
                                    <span>Tax ({selectedOrder.taxRate}%)</span>
                                    <span>${selectedOrder.taxAmount}</span>
                                </div>
                                <div class="modal-total-row">
                                    <span>Shipping</span>
                                    <span>
                                        <template if:true={selectedOrder.isFreeShipping}>
                                            Free
                                        </template>
                                        <template if:false={selectedOrder.isFreeShipping}>
                                            ${selectedOrder.shippingCost}
                                        </template>
                                    </span>
                                </div>
                                <div class="modal-total-row modal-total-final">
                                    <span>Total</span>
                                    <span>${selectedOrder.totalTTC}</span>
                                </div>
                            </div>
                        </div>

                        <template if:true={selectedOrder.invoiceStatus}>
                            <div class="modal-section">
                                <h3 class="modal-section-title">Invoice</h3>
                                <div class="modal-invoice">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A"
                                        stroke-width="2">
                                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                                        <polyline points="14 2 14 8 20 8" />
                                    </svg>
                                    <span>Status: <strong>{selectedOrder.invoiceStatus}</strong></span>
                                </div>
                            </div>
                        </template>

                    </div>
                </template>

            </div>
        </div>
    </template>

</template>
