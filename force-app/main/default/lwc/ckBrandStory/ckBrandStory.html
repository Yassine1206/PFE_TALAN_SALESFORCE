<template>
    <div class="ck-section-gray" id="aboutSection">
        <div class="ck-story-grid">
            <div class="ck-story-text">
                <span class="ck-story-eyebrow">{eyebrow}</span>
                <h2 class="ck-story-title">{title}</h2>
                <p class="ck-story-body">{displayDescription}</p>
                <a href={buttonUrl} class="ck-btn ck-btn-primary">{buttonText}</a>
            </div>
            <div class="ck-story-visual">
                <img src={displayImage} alt={title} />
                <div class="ck-story-accent"></div>
            </div>
        </div>
    </div>
</template>
