              <a

                target="_blank"

                title="TikTok"
                class="ck-footer-social-link"
              >

                  height="18"

        <!-- Shop -->
        <div class="ck-footer-col">
          <h4 class="ck-footer-heading">Shop</h4>
          <template for:each={shopLinks} for:item="link">
            <a
              key={link.Id}
              href={link.URL__c}
              target={link.target}
              class="ck-footer-link"
            >
              {link.Label__c}
            </a>
          </template>
        </div>

        <!-- About -->
        <div class="ck-footer-col">
          <h4 class="ck-footer-heading">About</h4>
          <template for:each={aboutLinks} for:item="link">
            <a
              key={link.Id}
              href={link.URL__c}
              target={link.target}
              class="ck-footer-link"
            >
              {link.Label__c}
            </a>
          </template>
        </div>

        <!-- Support -->
        <div class="ck-footer-col">
          <h4 class="ck-footer-heading">Support</h4>
          <template for:each={supportLinks} for:item="link">
            <a
              key={link.Id}
              href={link.URL__c}
              target={link.target}
              class="ck-footer-link"
            >
              {link.Label__c}
            </a>
          </template>
        </div>

        <!-- Newsletter -->
        <div class="ck-footer-col ck-footer-newsletter">
          <h4 class="ck-footer-heading">{newsletterTitle}</h4>
          <p class="ck-footer-newsletter-desc">{newsletterDescription}</p>
          <div class="ck-footer-newsletter-form">
            <input
              type="email"
              class="ck-footer-newsletter-input"
              placeholder="your@email.com"
              value={emailValue}
              oninput={handleEmailInput}
              onkeydown={handleKeyDown}
              disabled={isSubmitting}
            />
            <button
              class="ck-footer-newsletter-btn"
              onclick={handleSubscribe}
              disabled={isSubmitting}
            >
              <template lwc:if={isSubmitting}>
                <span class="ck-footer-spinner"></span>
              </template>
              <template lwc:else>
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M5 12h14M12 5l7 7-7 7"></path>
                </svg>
              </template>
            </button>
          </div>
          <template lwc:if={feedbackMessage}>
            <p class={feedbackClass}>{feedbackMessage}</p>
          </template>
        </div>
      </div>

      <div class="ck-footer-bottom">
        <span class="ck-footer-copyright">{copyrightText}</span>
        <div class="ck-footer-legal">
          <template lwc:if={privacyUrl}>
            <a href={privacyUrl} class="ck-footer-legal-link">Privacy Policy</a>
          </template>
          <template lwc:if={termsUrl}>
            <a href={termsUrl} class="ck-footer-legal-link">Terms of Service</a>
          </template>
          <template lwc:if={cookieUrl}>
            <a href={cookieUrl} class="ck-footer-legal-link">Cookie Settings</a>
          </template>
        </div>
