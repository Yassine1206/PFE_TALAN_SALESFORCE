<template>
        <!-- Bouton cart -->
        <button class="cart-float-btn" onclick={toggleCart}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path>
            </svg>
            <template if:true={hasItems}>
                <span class="cart-float-badge">{itemCount}</span>
            </template>
        </button>

        <!-- Overlay -->
        <template if:true={isOpen}>
            <div class="cart-overlay" onclick={closeCart}></div>
        </template>

        <!-- Drawer -->
        <div class={drawerClass}>
            <div class="cart-header">
                <h2 class="cart-title">Your Cart</h2>
                <span class="cart-count">{itemCount} items</span>
                <button class="cart-close" onclick={closeCart}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <!-- Guest banner -->
            <template if:true={isGuest}>
                <div class="cart-guest-banner">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    Sign in to save your cart
                </div>
            </template>

            <div class="cart-body">
                <!-- Loading -->
                <template if:true={isLoading}>
                    <div class="cart-loading">
                        <div class="cart-spinner"></div>
                    </div>
                </template>

                <template if:true={hasItems}>
                    <template for:each={cartItems} for:item="item">
                        <div key={item.id} class="cart-item">
                            <div class="cart-item-img">
                                <img src={item.image} alt={item.name} />
                            </div>
                            <div class="cart-item-info">
                                <h3 class="cart-item-name">{item.name}</h3>
                                <span class="cart-item-price">{item.price}</span>
                                <div class="cart-item-qty">
                                    <button class="qty-btn" data-id={item.id} data-action="minus"
                                        onclick={updateQty}>−</button>
                                    <span class="qty-value">{item.quantity}</span>
                                    <button class="qty-btn" data-id={item.id} data-action="plus"
                                        onclick={updateQty}>+</button>
                                </div>
                            </div>
                            <button class="cart-item-remove" data-id={item.id} onclick={removeItem}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </template>
                </template>

                <template if:false={hasItems}>
                    <template if:false={isLoading}>
                        <div class="cart-empty">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CED4DA"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path>
                            </svg>
                            <p class="cart-empty-text">Your cart is empty</p>
                            <button class="cart-empty-btn" onclick={closeCart}>Continue Shopping</button>
                        </div>
                    </template>
                </template>
            </div>

            <template if:true={hasItems}>
                <div class="cart-footer">
                    <div class="cart-subtotal">
                        <span class="cart-subtotal-label">Subtotal</span>
                        <span class="cart-subtotal-value">{subtotal}</span>
                    </div>
                    <p class="cart-shipping-note">Shipping and taxes calculated at checkout</p>
                    <a href="/s/checkout" class="cart-checkout-btn">Checkout</a>
                    <button class="cart-continue" onclick={closeCart}>Continue Shopping</button>
                </div>
            </template>
        </div>
    </template>
